name: testLoginAdam
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - id: healthcheck
        name: Check target website reachability
        shell: pwsh
        run: |
          $retries = 3
          for ($i = 0; $i -lt $retries; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "https://efadzli.com/software_testing/index.php?view=user_login" -TimeoutSec 20 -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "Website is reachable (status $($response.StatusCode))"
                "reachable=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                exit 0
              }
            } catch {
              Write-Host "Attempt $($i+1)/$retries failed: $_"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "Website unreachable after $retries attempts, skipping tests"
          "reachable=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Run testLoginAdam
        if: steps.healthcheck.outputs.reachable == 'true'
        run: mvn clean test -Dtest=LoginTest#testLoginAdam -Dheadless=true
      - name: Skip tests (website unreachable)
        if: steps.healthcheck.outputs.reachable != 'true'
        run: echo "Tests skipped because target website is not reachable from GitHub Actions"
      - uses: actions/upload-artifact@v4
        if: steps.healthcheck.outputs.reachable == 'true' && always()
        with:
          name: reports-testLoginAdam
          path: target/surefire-reports/