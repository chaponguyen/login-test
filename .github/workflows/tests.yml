name: Selenium Login Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Test - ${{ matrix.test-name }}"
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - test-method: testLoginAdam
            test-name: Valid Login
          - test-method: testLoginKhue
            test-name: Invalid Login
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Run ${{ matrix.test-name }}
        run: mvn clean test -Dtest=LoginTest#${{ matrix.test-method }} -Dheadless=true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.test-method }}
          path: target/surefire-reports/